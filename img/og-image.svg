<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="50%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6d00"/>
      <stop offset="100%" style="stop-color:#ff9100"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:rgba(255,109,0,0.06)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1050" cy="500" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="600" cy="315" r="300" fill="rgba(255,109,0,0.02)"/>

  <!-- Dots pattern -->
  <g fill="rgba(255,255,255,0.06)">
    <circle cx="50" cy="50" r="3"/>
    <circle cx="150" cy="50" r="3"/>
    <circle cx="250" cy="50" r="3"/>
    <circle cx="350" cy="50" r="3"/>
    <circle cx="850" cy="50" r="3"/>
    <circle cx="950" cy="50" r="3"/>
    <circle cx="1050" cy="50" r="3"/>
    <circle cx="1150" cy="50" r="3"/>
    <circle cx="50" cy="580" r="3"/>
    <circle cx="150" cy="580" r="3"/>
    <circle cx="250" cy="580" r="3"/>
    <circle cx="850" cy="580" r="3"/>
    <circle cx="950" cy="580" r="3"/>
    <circle cx="1050" cy="580" r="3"/>
    <circle cx="1150" cy="580" r="3"/>
    <circle cx="50" cy="130" r="2"/>
    <circle cx="1150" cy="130" r="2"/>
    <circle cx="50" cy="500" r="2"/>
    <circle cx="1150" cy="500" r="2"/>
  </g>

  <!-- Accent line -->
  <rect x="80" y="230" width="80" height="5" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Main title -->
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.6)">Robo Komputer</text>

  <!-- Tagline -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="white">Solusi All in One IT</text>

  <!-- Description -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.75)">
    Transformasi Digital &amp; Solusi IT Andal untuk Bisnis Anda
  </text>

  <!-- Features -->
  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="90" y="26" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Software Development</text>

    <rect x="200" y="0" width="160" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="280" y="26" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Sistem Informasi</text>

    <rect x="380" y="0" width="160" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="460" y="26" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Integrasi Sistem</text>

    <rect x="560" y="0" width="160" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="640" y="26" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Konsultasi IT</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.15)"/>
  <text x="600" y="615" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">robo-komputer.com — Solusi IT Terdepan untuk Produktivitas Bisnis Anda</text>
</svg>
